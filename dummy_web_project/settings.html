<!DOCTYPE html>
<html lang=en>
<head>
    <title>System Preferences Dashboard</title>
</head>
<body style="background-color: #0d1117; color: #c9d1d9; font-family: system-ui;">
    <main style="max-width: 600px; margin: 40px auto; padding: 20px;">
        <h2>System Configuration Preferences</h2>
        <div style="margin: 20px 0; display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #30363d; border-radius: 6px;">
            <div>
                <span style="font-weight: 600; display: block;">Database Synchronization</span>
                <span style="font-size: 0.85rem; color: #8b949e;">Sync indexes every hour to ensure data fresh state.</span>
            </div>
            <button style="padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: white;" aria-label=View sync history>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </button>
        </div>
    </main>
</body>
</html>
