<!DOCTYPE html>
<html lang=en>
<head>
    <title>E-Commerce Storefront</title>
</head>
<body style="background-color: #0d1117; color: #c9d1d9; font-family: system-ui;">
    <main style="max-width: 1000px; margin: 40px auto; padding: 20px;">
        <h2>Vibrant Marketplace</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px;">
            <div style="border: 1px solid #30363d; border-radius: 6px; padding: 20px; text-align: center;">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" style="width: 100%; height: 180px; object-fit: cover; border-radius: 4px;" alt=A silver smart fitness watch with a black band, showing a colorful clock face on its screen./>
                <h3>Smart Fitness Wearable</h3>
                <p style="color: var(--primary); font-weight: 600;">$149.00</p>
                <button style="padding: 10px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: white;" aria-label=Add to cart>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </button>
            </div>
            <div style="border: 1px solid #30363d; border-radius: 6px; padding: 20px; text-align: center;">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400" style="width: 100%; height: 180px; object-fit: cover; border-radius: 4px;" alt=A laptop on a wooden desk displaying lines of code./>
                <h3>Developer Workspace Laptop</h3>
                <p style="color: var(--primary); font-weight: 600;">$1,299.00</p>
                <button style="padding: 10px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: white;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
