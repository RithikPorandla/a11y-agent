<!DOCTYPE html>
<html lang=en>
<head>
    <title>Flexible Pricing Matrix</title>
</head>
<body style="background-color: #0d1117; color: #c9d1d9; font-family: system-ui;">
    <main style="max-width: 900px; margin: 40px auto; padding: 20px; text-align: center;">
        <h1>Choose Your Scale Tier</h1>
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <div style="flex: 1; border: 1px solid #30363d; border-radius: 6px; padding: 20px;">
                <h3>Developer Pro</h3>
                <p style="font-size: 2rem; color: white;">$29/mo</p>
                <button style="padding: 10px 20px; width: 100%; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 6px;" aria-label=Select Developer Pro plan>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
            <div style="flex: 1; border: 1px solid #30363d; border-radius: 6px; padding: 20px; background: rgba(159, 122, 234, 0.05);">
                <h3>Enterprise Premium</h3>
                <p style="font-size: 2rem; color: white;">$199/mo</p>
                <button style="padding: 10px 20px; width: 100%; background: var(--secondary); color: white; border: none; border-radius: 6px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
