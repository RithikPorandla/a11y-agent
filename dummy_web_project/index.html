<!DOCTYPE html>
<html lang=en>
<head>
    <title>Enterprise Portal Dashboard</title>
</head>
<body style="background-color: #0d1117; color: #c9d1d9; font-family: system-ui;">
    <header style="padding: 20px; border-bottom: 1px solid #21262d;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Visionary Inc. Dashboard</h2>
            <button style="background: none; border: none; cursor: pointer; color: white;" aria-label=Toggle dark mode>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>
    <main style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
        <section style="display: flex; gap: 20px; margin-bottom: 40px;">
            <div style="flex: 1; padding: 20px; border: 1px solid #30363d; border-radius: 6px;">
                <h3>Global HQ Workspace</h3>
                <p>An inside look at our collaborative offices in NY.</p>
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=400" style="max-width: 100%; border-radius: 4px;" alt=A bright, modern open-plan office with rows of desks and chairs./>
            </div>
            <div style="flex: 1; padding: 20px; border: 1px solid #30363d; border-radius: 6px;">
                <h3>Engineering Workbench</h3>
                <p>Developing next-generation AI integrations synchronously.</p>
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400" style="max-width: 100%; border-radius: 4px;" alt=A laptop on a wooden desk displaying lines of code./>
            </div>
        </section>
        <footer style="margin-top: 80px; padding: 20px; border-top: 1px solid #21262d; text-align: center;">
            <p>Connect with our socials:</p>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <a href="https://twitter.com/visionary" style="color: #58a6ff;" aria-label=Visionary on Twitter>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
                </a>
                <a href="https://github.com/visionary" style="color: #58a6ff;" aria-label=GitHub>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
            </div>
        </footer>
    </main>
</body>
</html>
